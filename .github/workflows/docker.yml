name: docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

# The auto-provided token needs packages:write to push to GHCR.
permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build single image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # `github.token` is the alias for the auto-provided token; some
          # workflow linters wrongly flag `secrets.GITHUB_TOKEN` because of
          # the reserved `GITHUB_` prefix on custom secret names.
          password: ${{ github.token }}

      - name: Lower-case repo owner
        id: meta_owner
        run: echo "owner=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Single image: ghcr.io/<owner>/<repo>
          # Lowercased because GHCR requires lowercase names.
          images: |
            ${{ env.REGISTRY }}/${{ steps.meta_owner.outputs.owner }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=awesome-bookmarks-manager
            org.opencontainers.image.description=Self-hosted encrypted bookmark manager (single container)
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
